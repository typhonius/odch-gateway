[server]
bind_address = "0.0.0.0:3000"
cors_origins = ["http://localhost:5173"]

[hub]
host = "127.0.0.1"
port = 4111
nickname = "Gateway"
description = "API Gateway"
email = ""
share_size = 0
speed = "LAN(T1)"
password = ""
reconnect_delay_secs = 5
max_reconnect_delay_secs = 300

[admin]
host = "127.0.0.1"
port = 53696
password = "CHANGE_ME_admin_password"

[database]
path = "/path/to/odchbot/logs/odchbot.db"

[auth]
api_keys = ["CHANGE_ME_your_secret_api_key"]

[webhook]
max_retries = 3
retry_delay_secs = 5
timeout_secs = 10
max_webhooks = 50
storage_path = "webhooks.json"

[rate_limit]
# Max requests per minute per API key on write endpoints
# (chat/message, kick, ban, gag, commands/execute)
requests_per_minute = 10
