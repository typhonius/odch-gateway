[server]
bind_address = "0.0.0.0:3000"
cors_origins = ["http://localhost:5173"]

[hub]
host = "127.0.0.1"
port = 4111
nickname = "Gateway"
description = "API Gateway"
email = ""
share_size = 0
speed = "LAN(T1)"
password = ""
reconnect_delay_secs = 5
max_reconnect_delay_secs = 300

[admin]
host = "127.0.0.1"
port = 53696
password = "CHANGE_ME_admin_password"

[database]
# SQLite (read-only):
url = "sqlite:///path/to/odchbot/logs/odchbot.db?mode=ro"
# PostgreSQL:
# url = "postgres://odchbot:password@localhost:5432/odchbot"

[auth]
api_keys = ["CHANGE_ME_your_secret_api_key"]

[webhook]
max_retries = 3
retry_delay_secs = 5
timeout_secs = 10
max_webhooks = 50
storage_path = "webhooks.json"

[rate_limit]
# Max requests per minute per API key on write endpoints
# (chat/message, kick, ban, gag, commands/execute)
requests_per_minute = 10

[admin_ui]
# Separate listener for the admin web UI (use nginx to reverse proxy)
bind_address = "127.0.0.1:3001"
username = "admin"
# Generate bcrypt hash: htpasswd -nBC 10 "" | tr -d ':\n'
password_hash = "$2b$10$CHANGE_ME_generate_a_bcrypt_hash"
session_expiry_hours = 8
jwt_secret = "CHANGE_ME_random_secret_at_least_32_chars"
